# Netlify configuration file for smartairlineaddons monorepo
[build]
  # Install client dependencies and compile the app from the root
  command = "npm install --prefix client && npm run build --prefix client"
  
  # The directory containing the final build assets
  publish = "client/build"

# Fallback redirect to support client-side React Router navigation
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
