<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bundle Builder - Airline+</title>
    <!-- Global CSS -->
    <link rel="stylesheet" href="../CSS/style.css">
    <!-- Page CSS -->
    <link rel="stylesheet" href="../CSS/bundle.css">
</head>

<body>
    <div class="navbar">
        <div class="logo">Airline+</div>
        <div class="nav-links">
            <a href="catalogue.html">Catalogue</a>
            <a href="cart.html">Cart</a>
            <a href="bundle.html">Bundle Builder</a>
            <a href="change-flight.html">Change Flight</a>
            <a href="seat-upgrade.html">Seat Upgrade</a>
            <a href="history.html">Order History</a>
            <a href="login.html" onclick="logout()">Logout</a>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    <div class="page">
        <div class="container">
            <h1 class="title">Select Services</h1>

            <div id="bundle-list" class="card-container"></div>

            <div class="bundle-summary summary">
                <h2>Total: ₹<span id="bundle-total">0</span></h2>
                <h3 style="color: var(--primary-blue); margin-top: 10px;">Discounted: ₹<span id="discount-price">0</span></h3>
                <button onclick="addBundleToCart()" style="margin-top: 20px;">Add Bundle</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../JS/auth.js"></script>
    <script src="../JS/bundle.js"></script>
</body>

</html>
