<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Airline+</title>
    <!-- Global CSS -->
    <link rel="stylesheet" href="../CSS/style.css">
    <!-- Page CSS -->
    <link rel="stylesheet" href="../CSS/admin.css">
</head>

<body>
    <div class="navbar">
        <div class="logo">Airline+ Admin</div>
        <div class="nav-links">
            <a href="catalogue.html">User View</a>
            <a href="login.html" onclick="logout()">Logout</a>
        </div>
    </div>
    
    <div id="toast" class="toast"></div>
    <div class="page">
        <div class="container">
            <h1 class="title">Manage Services</h1>
            <!-- Add Service -->
            <div class="form-box">
                <input type="text" id="service-name" placeholder="Service Name">
                <input type="number" id="service-price" placeholder="Price (₹)">
                <button onclick="addService()">Add Service</button>
            </div>
            <!-- Service List -->
            <div id="service-list" class="card-container"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../JS/auth.js"></script>
    <script src="../JS/admin.js"></script>
</body>

</html>
